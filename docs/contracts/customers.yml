entity: customers
version: "1.0"
grain: one row per customer

columns:
  customer_id:
    type: string
    nullable: false
    unique: true
    description: Seeded UUID generated by the simulator

  first_name:
    type: string
    nullable: false

  last_name:
    type: string
    nullable: false

  email:
    type: string
    nullable: false
    unique: true
    description: Guaranteed unique across all countries within a simulation run

  country:
    type: string
    nullable: false
    accepted_values: [AU, US, UK]

  currency:
    type: string
    nullable: false
    accepted_values: [AUD, USD, GBP]
    business_rule: currency must match country — AU=AUD, US=USD, UK=GBP

  city:
    type: string
    nullable: false
    description: Locale-aware — AU customers get Australian cities, etc.

  registered_at:
    type: timestamp
    nullable: false
    description: UTC. Falls within the configured simulation date range.

  is_active:
    type: boolean
    nullable: false
    description: All customers are active in v0.1. Churn modelling is a future feature.
