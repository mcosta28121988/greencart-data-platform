entity: products
version: "1.0"
grain: one row per product

columns:
  product_id:
    type: string
    nullable: false
    unique: true
    description: Seeded UUID generated by the simulator

  name:
    type: string
    nullable: false
    description: Product name from the sustainable goods catalogue

  category:
    type: string
    nullable: false
    accepted_values: [Kitchen, Personal Care, Accessories, Electronics,
                      Stationery, Home, Fitness, Clothing]

  base_price_usd:
    type: float
    nullable: false
    business_rule: value between 5.00 and 120.00 USD
    description: >
      Stored in USD. Converted to local currency at order time
      using the exchange rates defined in the simulator config.

  is_active:
    type: boolean
    nullable: false
    description: All products are active in v0.1. Catalogue management is a future feature.
