entity: order_lines
version: "1.0"
grain: one row per product line per order

description: >
  The order detail. One row per product within an order.
  This is the fact table that connects orders to products.
  Revenue, item counts and category breakdowns are all derived
  from this table in the transformation layer.

columns:
  order_line_id:
    type: string
    nullable: false
    unique: true
    description: Seeded UUID generated by the simulator

  order_id:
    type: string
    nullable: false
    references: orders.order_id

  product_id:
    type: string
    nullable: false
    references: products.product_id

  product_name:
    type: string
    nullable: false
    description: Denormalised from products for query convenience

  category:
    type: string
    nullable: false
    description: Denormalised from products for query convenience

  quantity:
    type: integer
    nullable: false
    business_rule: between 1 and 3

  unit_price:
    type: float
    nullable: false
    business_rule: greater than 0
    description: >
      Product base_price_usd converted to local currency at order time.
      Rate: AUD=1.52, USD=1.00, GBP=0.79.

  line_total:
    type: float
    nullable: false
    business_rule: equals quantity * unit_price rounded to 2 decimal places
