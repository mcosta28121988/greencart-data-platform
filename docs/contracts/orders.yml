entity: orders
version: "1.0"
grain: one row per order

columns:
  order_id:
    type: string
    nullable: false
    unique: true
    description: Seeded UUID generated by the simulator

  customer_id:
    type: string
    nullable: false
    references: customers.customer_id

  country:
    type: string
    nullable: false
    accepted_values: [AU, US, UK]
    description: Inherited from the placing customer. Does not change.

  currency:
    type: string
    nullable: false
    accepted_values: [AUD, USD, GBP]
    description: Inherited from the placing customer.

  status:
    type: string
    nullable: false
    accepted_values: [delivered, cancelled]
    description: >
      v0.1 only models delivered and cancelled. The placed and
      processing states are reserved for future real-time simulation.

  order_total:
    type: float
    nullable: false
    business_rule: must be greater than 0
    description: Sum of item prices converted to local currency.

  num_items:
    type: integer
    nullable: false
    business_rule: between 1 and 5

  placed_at:
    type: timestamp
    nullable: false
    business_rule: must be on or after the customer's registered_at

  delivered_at:
    type: timestamp
    nullable: true
    business_rule: >
      populated only when status is delivered.
      always after placed_at, typically 2 to 14 days later.
      null when status is cancelled.
