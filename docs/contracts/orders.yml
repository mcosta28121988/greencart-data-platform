entity: orders
version: "2.0"
grain: one row per order

description: >
  The order header. Contains who placed the order, when, and its
  current status. Does not contain financial totals — those are
  derived from order_lines in the transformation layer.

columns:
  order_id:
    type: string
    nullable: false
    unique: true
    description: Seeded UUID generated by the simulator

  customer_id:
    type: string
    nullable: false
    references: customers.customer_id

  country:
    type: string
    nullable: false
    accepted_values: [AU, US, UK]

  currency:
    type: string
    nullable: false
    accepted_values: [AUD, USD, GBP]

  status:
    type: string
    nullable: false
    accepted_values: [delivered, cancelled]

  placed_at:
    type: timestamp
    nullable: false
    business_rule: must be on or after the customer registered_at

  delivered_at:
    type: timestamp
    nullable: true
    business_rule: >
      populated only when status is delivered.
      always after placed_at, typically 2 to 14 days later.
      null when status is cancelled.

removed_fields:
  - order_total: derived from sum of order_lines.line_total in dbt
  - num_items: derived from count of order_lines rows in dbt
